<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="emp-ficticia.png" type="image/x-icon">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="emp-ficticia.png">
<link rel="stylesheet" href="style.css">
<title>Sistema de consulta de Crachás</title>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">  
        <img src="emp-ficticia.png" alt="" width="100px">
    </div>

    <!-- CONTEÚDO -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <h1>Sistema de consulta de Crachás</h1>
        </div>

        <!-- CONSULTA -->
        <div class="card">
            <input id="inputCracha" placeholder="Digite o nº do crachá">
            <button onclick="consultar()">Consultar</button>
               <!-- BOTÃO LIMPAR -->
            <button id="btnLimpar" onclick="limpar()">Limpar</button>
        </div>

        <!-- LOADING -->
        <div id="loading"></div>
    <br>
        <!-- RESULTADO -->

        <div id="resultado"></div>

          <!-- HISTÓRICO 
        <div class="card">
            <h3>Histórico de Consultas</h3>
            <div id="historico"></div>
        </div>-->

        <!-- HISTÓRICO -->
        <div class="card">
            <div class="historico-topo">
                <h3>Últimas consultas:</h3>
                <button id="toggleHistorico">🔽</button>
            </div>
            <div id="historico" class="historico-conteudo"></div>
        </div>
    </div>

      <!-- Script de rodar offline -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('assets/js/service-worker.js')
          .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
          .catch(err => console.error('❌ Erro ao registrar Service Worker:', err));
      });
    }
  </script>

    <script src="script.js"></script> 
    <script src="service-worker.js"></script>
</body>
</html>
