<style>
    body {

    margin: 0;

    font-family: Arial;

    background: #1e1e1e;

    color: white;

    display: flex;

    overflow: hidden;

}

 

/* SIDEBAR */

.sidebar {

    width: 220px;

    background: orangered;

    height: 100vh;

    padding: 20px;

    /* overflow: hidden; */

}

 

.sidebar img{

    margin-top: 50px;

}

 

.sidebar h2 {

    margin: 0;

}

 

.sidebar p {

    margin-top: 30px;

    cursor: pointer;

}

 

/* CONTEÚDO */

.main {

    flex: 1;

    padding: 20px;

}

 

/* HEADER */

.header {

    display: flex;

    justify-content: space-between;

    margin-bottom: 20px;

}

 

/* CARD */

.card {

    background: #2a2a2a;

    padding: 20px;

    border-radius: 10px;

    margin-bottom: 20px;

}

 

.grid {

    display: grid;

    grid-template-columns: repeat(2, 1fr); /* 2 colunas igual imagem 2 */

    gap: 15px;

}

 

.box {

    border-left: 2px solid#d46000;
    background: linear-gradient(145deg, #3a3a3a, #2f2f2f);
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    filter: drop-shadow(2px 1px 5px #d46000) ;
    transition: 0.2s;
    padding: 15px;
    border-radius: 10px;

}

 

.box small {

    display: block;

    color: #aaa;

    margin-bottom: 5px;

    font-size: 12px;

}

 

/* INPUT */

input {

    padding: 10px;

    width: 300px;

    margin-right: 10px;

    border: none;

    border-radius: 6px;

}

 

/* BUTTON */

button {

    padding: 10px 20px;

    background: #ec7000;

    border: none;

    color: white;

    border-radius: 6px;

    cursor: pointer;

}

 

button:hover {

    background: #d46000;

}

 

/* STATUS */

.ativo {

    color: #00ff9c;

}

 

.inativo {

    color: #ff4d4d;

}

 

/* HISTÓRICO */

.item {

    border-bottom: 1px solid #444;

    padding: 8px 0;

}

 

/* CONTAINER LOADING */

.loading-box {

    display: flex;

    flex-direction: column;

    align-items: center;

    justify-content: center;

    padding: 30px;

}

 

/* SPINNER */

.spinner {

    width: 40px;

    height: 40px;

    border: 4px solid #444;

    border-top: 4px solid #ec7000;

    border-radius: 50%;

    animation: girar 1s linear infinite;

    margin-bottom: 15px;

}

 

@keyframes girar {

    to { transform: rotate(360deg); }

}

 

/* TEXTO */

.loading-text {

    font-size: 14px;

    color: #aaa;

    margin-bottom: 10px;

}

 

/* BARRA DE PROGRESSO */

.progress-bar {

    width: 200px;

    height: 6px;

    background: #333;

    border-radius: 10px;

    overflow: hidden;

}

 

.progress {

    height: 100%;

    width: 0%;

    background: #003fec;

    animation: carregando 1s linear forwards;

}

 

@keyframes carregando {

    from { width: 0%; }

    to { width: 100%; }

}

 

/* SKELETON */

.skeleton {

    background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);

    background-size: 200% 100%;

    animation: shimmer 1.2s infinite;

    border-radius: 8px;

}

 

@keyframes shimmer {

    0% { background-position: 200% 0; }

    100% { background-position: -200% 0; }

}

 

.skeleton-box {

    height: 50px;

}

 

#resultado {

    transition: opacity 0.3s ease;

}

 

.historico-topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

 

#toggleHistorico {
    background: transparent;
    border: none;
    font-size: 16px;
    cursor: pointer;

}

 

.historico-conteudo {
    max-height: 250px;
    overflow: hidden;
    transition: all 0.3s ease;
}

 

/* estado recolhido */
.historico-conteudo.recolhido {
    max-height: 0;
    opacity: 0;
}

 

@media (max-width: 768px) {
    body{
        display: block;
        overflow-y: auto;
    }
.main {

    }

        font-size: 18px;

}

    // ================= BASE =================

    function gerarBase(configs) {

        const lista = [];

 

        configs.forEach(config => {

            config.intervalos.forEach(intervalo => {

                for (let i = intervalo.inicio; i <= intervalo.fim; i++) {

                    lista.push({

                        numero: String(i),

                        tipo: intervalo.tipo,

                        polo: config.polo,

                        status: "Ativo"

                    });

                }

            });

        });

 

        return lista;

    }

 

   // ENTER

    document.getElementById("inputCracha")

    .addEventListener("keydown", e => {

        if(e.key === "Enter") consultar();

    });

 

    function consultarCracha(numero) {

        const num = Number(numero);

 

        for (const config of configuracoes) {

            for (const intervalo of config.intervalos) {

                if (num >= intervalo.inicio && num <= intervalo.fim) {

                    return {

                        numero: numero,

                        tipo: intervalo.tipo,

                        polo: config.polo,

                        status: "Ativo"

                    };

                }

            }

        }

 

        return null;

    }

 

    //Efeito animação loading

    const loading = document.getElementById("loading");

 

    function mostrarLoading() {

        return `

            <div class="loading-box">

                <div class="spinner"></div>

                <div class="loading-text">Consultando dados...</div>

                <div class="progress-bar">

                    <div class="progress"></div>

                </div>

            </div>

        `;

    }

 

    function mostrarSkeleton() {

        return `

            <div class="grid-info">

                ${Array(4).fill(`

                    <div class="info-box">

                        <div class="skeleton skeleton-box"></div>

                    </div>

                `).join('')}

            </div>

        `;

    }

 

    //histórico

    let historico = [];

 

    function consultar(){

    const numero = document.getElementById("inputCracha").value.trim();

    if(!numero) return;

 

    const resultado = document.getElementById("resultado");

 

    // Mostrar loading + skeleton

    loading.innerHTML = mostrarLoading();

    resultado.innerHTML = mostrarSkeleton();

 

    setTimeout(() => {

 

        const dado = consultarCracha(numero);

 

        historico.unshift({

            cracha: numero,

            data: new Date().toLocaleString()

        });

 

        renderHistorico();

 

        if(dado){

            resultado.innerHTML = `

                <div class="card">

                    <div class="grid">

                        <div class="box">

                            <small>Número</small>

                            <div>${dado.numero}</div>

                        </div>

                        <div class="box">

                            <small>Tipo</small>

                            <div>${dado.tipo}</div>

                        </div>

                        <div class="box">

                            <small>Polo</small>

                            <div>${dado.polo}</div>

                        </div>

                        <div class="box">

                            <small>Status</small>

                            <div class="${dado.status === 'Ativo' ? 'ativo' : 'inativo'}">

                                ${dado.status}

                            </div>

                        </div>

                    </div>

                </div>

            `;

        } else {

            resultado.innerHTML = `<div style="color:red;">Crachá não encontrado</div>`;

        }

 

        loading.innerHTML = "";

 

    }, 500);

}

 

  function renderHistorico(){

        const div = document.getElementById("historico");

 

        div.innerHTML = "";

 

        historico.slice(0, 10).forEach(item => {

            div.innerHTML += `

                <div class="item">

                    ${item.cracha} - ${item.data}

                </div>

            `;

        });

    }

 

/*Botão limpar imputs*/
document.getElementById("btnLimpar").addEventListener("click", limpar);
    function limpar() {
        document.getElementById("inputCracha").value = "";
        document.getElementById("resultado").innerHTML = "";
        document.getElementById("loading").innerHTML = "";
        document.getElementById("inputCracha").focus();
    }

/*Botão limpar recolher e espandir*/
const btnToggle = document.getElementById("toggleHistorico");
const historicoBox = document.getElementById("historico");

btnToggle.addEventListener("click", () => {
    historicoBox.classList.toggle("recolhido");
    btnToggle.textContent = historicoBox.classList.contains("recolhido")
        ? "🔼"
        : "🔽";
});
